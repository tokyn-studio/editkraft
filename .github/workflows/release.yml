name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Erzeugt/aktualisiert den Version-PR oder published, wenn ein Version-PR gemergt wurde.
      # publish nutzt `pnpm release` (turbo build + changeset publish).
      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node erzeugt eine .npmrc mit _authToken=${NODE_AUTH_TOKEN};
          # ohne diese Zeile publiziert npm unauthentifiziert → 404.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
